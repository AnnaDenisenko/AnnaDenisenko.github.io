<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US & Ukraine Sister Cities</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --ukraine-blue: #0057B7;
            --ukraine-yellow: #FFDD00;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: var(--ukraine-blue);
            color: var(--ukraine-yellow);
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 { margin: 0; font-size: 2.5rem; }
        header p { margin-top: 0.5rem; font-size: 1.1rem; color: #fff; }
        
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Map Styling */
        #map {
            height: 450px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #ddd;
            z-index: 1;
        }
        
        /* Custom Map Pins */
        .custom-pin {
            background: transparent;
            border: none;
            filter: drop-shadow(0px 3px 4px rgba(0,0,0,0.4));
            transition: opacity 0.3s ease; /* Smooth fade for map pins */
        }

        .search-box {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--ukraine-blue);
            box-shadow: 0 0 0 3px rgba(0, 87, 183, 0.2);
        }

        /* Subtle Toggle Button Styling */
        .controls-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        .toggle-btn {
            background-color: transparent;
            color: #666;
            border: 1px solid #ccc;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background-color: #f1f3f5;
            color: #333;
            border-color: #999;
        }
        
        /* Table Styling */
        #tableContainer {
            transition: all 0.3s ease;
        }

        .city-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        th, td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid #eee;
            width: 50%;
        }
        
        th {
            background-color: #f1f3f5;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        /* Sortable Headers */
        .sortable {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        
        .sortable:hover {
            background-color: #e2e6ea;
        }

        .sort-icon {
            font-size: 0.8rem;
            margin-left: 6px;
            color: #999;
        }

        /* Interactive Row Styling */
        .city-row {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        
        .city-row:last-child td { border-bottom: none; }
        
        /* Hover Effect */
        .city-row:hover { 
            background-color: #f1f8ff; 
        }

        /* Selected State Styling */
        .city-row.selected-row {
            background-color: #e2f0fc;
            box-shadow: inset 4px 0 0 var(--ukraine-blue);
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: none;
        }
        
        @media (max-width: 600px) {
            th, td { padding: 0.8rem; }
            h1 { font-size: 2rem; }
            #map { height: 300px; }
        }
    </style>
</head>
<body>

<header>
    <h1>US & Ukraine Sister Cities</h1>
    <p>A directory of solidarity, resilience, and global partnership.</p>
</header>

<div class="container">
    <input type="text" id="searchInput" class="search-box" placeholder="Search for a US city, US state, or Ukrainian city...">
    
    <div id="map"></div>
    
    <div class="controls-row">
        <button id="toggleTableBtn" class="toggle-btn">Hide Table View</button>
    </div>

    <div id="tableContainer">
        <table class="city-table" id="cityTable">
            <thead>
                <tr>
                    <th class="sortable" onclick="sortData('usCity')">US City, State <span class="sort-icon" id="usCity-icon">⇕</span></th>
                    <th class="sortable" onclick="sortData('uaCity')">Ukrainian City <span class="sort-icon" id="uaCity-icon">⇕</span></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
        <div id="noResults" class="no-results">
            <h3>No matching cities found</h3>
            <p>Try adjusting your search terms.</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

        { usCity: "Rockford", usState: "IL", uaCity: "Brovary", usLat: 42.2711, usLon: -89.0940, uaLat: 50.5111, uaLon: 30.7900 },
        { usCity: "Sacramento", usState: "CA", uaCity: "Sumy", usLat: 38.5816, usLon: -121.4944, uaLat: 50.9072, uaLon: 34.7981 },

        { usCity: "Sonoma", usState: "CA", uaCity: "Kaniv", usLat: 38.2919, usLon: -122.4580, uaLat: 49.7436, uaLon: 31.4556 },
        { usCity: "Stamford", usState: "CT", uaCity: "Kramatorsk", usLat: 41.0534, usLon: -73.5387, uaLat: 48.7390, uaLon: 37.5844 },
        { usCity: "Syracuse", usState: "NY", uaCity: "Irpin", usLat: 43.0481, usLon: -76.1474, uaLat: 50.5187, uaLon: 30.2372 },
        { usCity: "Tacoma", usState: "WA", uaCity: "Brovary", usLat: 47.2529, usLon: -122.4443, uaLat: 50.5111, uaLon: 30.7900 },
        { usCity: "Vincennes", usState: "IN", uaCity: "Ovruch", usLat: 38.6773, usLon: -87.5286, uaLat: 51.3250, uaLon: 28.8058 },
        { usCity: "Wabash", usState: "IN", uaCity: "Korosten", usLat: 40.7978, usLon: -85.8205, uaLat: 50.9500, uaLon: 28.6333 },
        { usCity: "White Plains", usState: "NY", uaCity: "Chernihiv", usLat: 41.0339, usLon: -73.7629, uaLat: 51.4982, uaLon: 31.2893 }
    ];

    // Helper to generate SVG map pins dynamically
    const createMarkerIcon = (color) => {
        const svgTemplate = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
                <path fill="${color}" stroke="#ffffff" stroke-width="1.5" d="M16 2C10.5 2 6 6.5 6 12c0 7.5 10 18 10 18s10-10.5 10-18c0-5.5-4.5-10-10-10zm0 14c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4z"/>
            </svg>`;
        
        return L.divIcon({
            className: 'custom-pin', 
            html: svgTemplate,
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });
    };

    const blueIcon = createMarkerIcon('#0057B7'); // US Blue
    const yellowIcon = createMarkerIcon('#FFD000'); // Ukraine Yellow

    // State Tracking
    let currentRenderedItems = []; // Tracks { pair, row, mapElements }
    let selectedPairs = new Set(); // Tracks active selections
    let currentSortColumn = '';
    let currentSortDirection = '';

    // Initialize Map
    const map = L.map('map').setView([45, -25], 2); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // DOM Elements
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const cityTable = document.getElementById('cityTable');
    const toggleTableBtn = document.getElementById('toggleTableBtn');
    const tableContainer = document.getElementById('tableContainer');

    // Toggle Table Logic
    let isTableVisible = true;
    toggleTableBtn.addEventListener('click', () => {
        isTableVisible = !isTableVisible;
        if (isTableVisible) {
            tableContainer.style.display = 'block';
            toggleTableBtn.textContent = 'Hide Table View';
        } else {
            tableContainer.style.display = 'none';
            toggleTableBtn.textContent = 'Show Table View';
        }
    });

    // Row Selection & Opacity Update Logic
    function handleRowClick(clickedItem) {
        // Toggle selection state
        if (selectedPairs.has(clickedItem.pair)) {
            selectedPairs.delete(clickedItem.pair);
            clickedItem.row.classList.remove('selected-row');
        } else {
            selectedPairs.add(clickedItem.pair);
            clickedItem.row.classList.add('selected-row');
        }
        
        updateMapOpacities();
    }

    function updateMapOpacities() {
        const hasSelection = selectedPairs.size > 0;
        
        currentRenderedItems.forEach(item => {
            const isSelected = selectedPairs.has(item.pair);
            
            // Set capacity/opacity. If nothing is selected, everything is visible.
            // If something is selected, unselected items drop to 0.013.
            const opacityMarker = (!hasSelection || isSelected) ? 1 : 0.013;
            const opacityLine = (!hasSelection || isSelected) ? 0.3 : 0.013;

            item.mapElements.usMarker.setOpacity(opacityMarker);
            item.mapElements.uaMarker.setOpacity(opacityMarker);
            
            // Lines are updated via setStyle in Leaflet
            item.mapElements.connectionLine.setStyle({ opacity: opacityLine });
            
            // Bring selected lines to front so they aren't hidden behind dimmed lines
            if (isSelected && item.mapElements.connectionLine.bringToFront) {
                item.mapElements.connectionLine.bringToFront();
            }
        });
    }

    // Sort Logic
    function sortData(column) {
        if (currentSortColumn === column) {
            currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
            currentSortColumn = column;
            currentSortDirection = 'asc';
        }

        // Update Sorting Icons visually
        document.getElementById('usCity-icon').textContent = '⇕';
        document.getElementById('uaCity-icon').textContent = '⇕';
        
        const activeIcon = document.getElementById(column + '-icon');
        activeIcon.textContent = currentSortDirection === 'asc' ? '▲' : '▼';
        activeIcon.style.color = '#0057B7'; 

        // Sort the main data array
        sisterCities.sort((a, b) => {
            let valA = a[column].toLowerCase();
            let valB = b[column].toLowerCase();
            
            if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
            if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
            return 0;
        });

        applyFilterAndRender();
    }

    // Filter and Render Logic
    function applyFilterAndRender() {
        const searchTerm = searchInput.value.toLowerCase();
        
        const filteredData = sisterCities.filter(pair => {
            const fullStateName = stateDictionary[pair.usState] ? stateDictionary[pair.usState].toLowerCase() : "";
            
            return pair.usCity.toLowerCase().includes(searchTerm) ||
                   pair.usState.toLowerCase().includes(searchTerm) ||
                   fullStateName.includes(searchTerm) ||
                   pair.uaCity.toLowerCase().includes(searchTerm);
        });
        
        renderView(filteredData);
    }

    searchInput.addEventListener('input', applyFilterAndRender);

    // Build the UI
    function renderView(data) {
        // Clear previous renders
        tableBody.innerHTML = '';
        currentRenderedItems.forEach(item => {
            map.removeLayer(item.mapElements.usMarker);
            map.removeLayer(item.mapElements.uaMarker);
            map.removeLayer(item.mapElements.connectionLine);
        });
        currentRenderedItems = [];
        selectedPairs.clear(); // Reset selection on a new filter/render
        
        if (data.length === 0) {
            cityTable.style.display = 'none';
            noResults.style.display = 'block';
            return;
        }
        
        cityTable.style.display = 'table';
        noResults.style.display = 'none';
        
        data.forEach(pair => {
            // Create Table Row
            const row = document.createElement('tr');
            row.className = 'city-row';
            row.innerHTML = `
                <td><strong>${pair.usCity}</strong>, <strong>${pair.usState}</strong></td>
                <td><strong>${pair.uaCity}</strong></td>
            `;
            tableBody.appendChild(row);

            // Create Map Elements
            const usMarker = L.marker([pair.usLat, pair.usLon], { icon: blueIcon })
                .bindPopup(`<b>${pair.usCity}, ${pair.usState}</b><br>Sister City: ${pair.uaCity}`);
            
            const uaMarker = L.marker([pair.uaLat, pair.uaLon], { icon: yellowIcon })
                .bindPopup(`<b>${pair.uaCity}, Ukraine</b><br>Sister City: ${pair.usCity}, ${pair.usState}`);
            
            const connectionLine = L.polyline([
                [pair.usLat, pair.usLon], 
                [pair.uaLat, pair.uaLon]
            ], {
                color: '#0057B7', 
                weight: 2,
                opacity: 0.3,
                dashArray: '5, 5' 
            });

            usMarker.addTo(map);
            uaMarker.addTo(map);
            connectionLine.addTo(map);
            
            // Store item reference for interactions
            const item = { pair, row, mapElements: { usMarker, uaMarker, connectionLine } };
            currentRenderedItems.push(item);

            // Attach click event for row selection
            row.addEventListener('click', () => handleRowClick(item));
        });

        // Fit map bounds if elements exist
        if (currentRenderedItems.length > 0) {
            const markers = currentRenderedItems.flatMap(i => [i.mapElements.usMarker, i.mapElements.uaMarker]);
            const group = new L.featureGroup(markers);
            map.fitBounds(group.getBounds(), { padding: [30, 30] });
        }
    }

    // Initialize page by sorting US Cities A-Z
    sortData('usCity');

</script>

</body>
</html>
